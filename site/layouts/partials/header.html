<header class="site-header">
    <div class="header-inner">
        <a href="/" class="logo" aria-label="{{ .Site.Params.brand }}: Home">
            <span class="logo-icon">
                <svg width="22" height="22" viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                    <circle cx="11" cy="13.5" r="7" stroke="white" stroke-width="1.5" fill="none"/>
                    <path d="M4 13.5 Q7.5 11 11 13.5 Q14.5 16 18 13.5" stroke="white" stroke-width="0.9" fill="none" stroke-linecap="round"/>
                    <path d="M11 6.5 Q8.75 10 11 13.5 Q13.25 17 11 20.5" stroke="white" stroke-width="0.9" fill="none" stroke-linecap="round"/>
                    <path d="M5.5 9 Q11 2.5 16.5 9" stroke="white" stroke-width="1.9" fill="none" stroke-linecap="round"/>
                    <circle cx="16" cy="9" r="1.4" fill="white"/>
                </svg>
            </span>
            <span class="logo-text">Repatriate <span>Service</span></span>
        </a>

        <nav class="main-nav" aria-label="Main navigation">
            <ul class="nav-list">
                <li><a href="/" {{ if .IsHome }}aria-current="page"{{ end }}>Home</a></li>
                <li><a href="/about/" {{ if eq .RelPermalink "/about/" }}aria-current="page"{{ end }}>About Us</a></li>
                <li><a href="/countries/" {{ if eq .Section "countries" }}aria-current="page"{{ end }}>Country Guides</a></li>
                <li class="nav-dropdown">
                    <span class="nav-dropdown-toggle" role="button" tabindex="0" aria-haspopup="true" aria-expanded="false">
                        Resources
                        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><polyline points="6 9 12 15 18 9"/></svg>
                    </span>
                    <div class="nav-dropdown-menu" role="menu">
                        <a href="/guides/" role="menuitem" {{ if eq .Section "guides" }}aria-current="page"{{ end }}><i class="fa-solid fa-circle-info" aria-hidden="true"></i>What to do abroad</a>
                        <a href="/cremation-transfer/" role="menuitem" {{ if eq .Section "cremation-transfer" }}aria-current="page"{{ end }}><i class="fa-solid fa-fire" aria-hidden="true"></i>Cremation abroad</a>
                        <a href="/embassy-contacts/" role="menuitem" {{ if eq .Section "embassy-contacts" }}aria-current="page"{{ end }}><i class="fa-solid fa-building-columns" aria-hidden="true"></i>Embassy contacts</a>
                        <a href="/bringing-ashes-home/" role="menuitem" {{ if eq .Section "bringing-ashes-home" }}aria-current="page"{{ end }}><i class="fa-solid fa-jar" aria-hidden="true"></i>Bringing ashes home</a>
                        <a href="/blog/" role="menuitem" {{ if eq .Section "blog" }}aria-current="page"{{ end }}><i class="fa-solid fa-book-open" aria-hidden="true"></i>Guidance articles</a>
                    </div>
                </li>
                <li><a href="/services/" {{ if eq .RelPermalink "/services/" }}aria-current="page"{{ end }}>Services</a></li>
                <li><a href="/contact/" {{ if eq .RelPermalink "/contact/" }}aria-current="page"{{ end }}>Contact</a></li>
            </ul>
        </nav>

        <a href="https://wa.me/{{ .Site.Params.whatsappNumber }}" class="header-phone" aria-label="WhatsApp us" target="_blank" rel="noopener">
            <i class="fa-brands fa-whatsapp"></i>
            <span>WhatsApp us</span>
        </a>

        <a href="/contact/" class="header-cta">Get Help Now</a>

        <button class="mobile-toggle" aria-label="Toggle menu" aria-expanded="false">
            <span class="toggle-bar"></span>
            <span class="toggle-bar"></span>
            <span class="toggle-bar"></span>
        </button>
    </div>
</header>
