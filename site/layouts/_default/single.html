{{ define "main" }}
<section class="page-hero" style="background-image: url('{{ with .Params.hero_image }}{{ . }}{{ else }}/images/ctandt-ai-generated-8884751.jpg{{ end }}');">
    <div class="page-hero-content">
        <p class="label-sm">{{ with .Parent }}{{ .Title }}{{ else }}Repatriate Service{{ end }}</p>
        <h1>{{ .Title }}</h1>
        {{ with .Description }}<p>{{ . }}</p>{{ end }}
        <div class="hero-actions page-hero-actions">
            <a href="/contact/" class="btn btn-cta">Speak to Our Team</a>
        </div>
    </div>
</section>

<section class="section">
    <div class="section-inner">
        <div class="content-section">
            {{ .Content }}
        </div>
    </div>
</section>
{{ end }}
