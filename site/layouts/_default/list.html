{{ define "main" }}
{{/* D4.1: calm, unused image; the couple-at-deathbed default was on the
     audit's distressing list. This is the generic section-list fallback. */}}
<section class="page-hero" style="background-image: url('{{ with .Params.hero_image }}{{ . }}{{ else }}/images/document-checklist.jpg{{ end }}');">
    <div class="page-hero-content">
        <p class="label-sm">Repatriate Service</p>
        <h1>{{ .Title }}</h1>
        {{ with .Description }}<p>{{ . }}</p>{{ end }}
        <div class="hero-actions page-hero-actions">
            <a href="/contact/" class="btn btn-cta">Request Support</a>
        </div>
    </div>
</section>

<section class="section">
    <div class="section-inner">
        {{ .Content }}
    </div>
</section>
{{ end }}
