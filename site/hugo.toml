baseURL = "https://www.repatriationfuneral.com/"
languageCode = "en-gb"
title = "Repatriate Service"
# last-reviewed: 2026-06-01

# Build future-dated content. Without this, Hugo silently skips any page whose
# date is later than the build time. Because GitHub Actions builds in UTC, a
# page dated "today" can be skipped if the build runs before UTC midnight,
# producing 404s with no build error. Every page on this site is meant to go
# live on commit (there is no editorial schedule), so building future-dated
# content is the correct behaviour here. See ERRORS.md E012.
buildFuture = true

[params]
  brand = "Repatriate Service"
  tagline = "Bringing your loved ones home"
  description = "Country-specific guides for repatriating a loved one to the United Kingdom. Step-by-step processes, costs, embassy contacts, and professional coordination."
  quoteFormEndpoint = "https://formsubmit.co/ajax/garethsomers@outlook.com"
  whatsappNumber = "447703577246"
  plausibleDomain = "repatriationfuneral.com"
  googleAnalyticsID = "G-EJEH8YRQS7"

[permalinks]
  [permalinks.page]
    countries = "/repatriation-from-:sections[last]/:slug/"
    guides = "/guides/:slug/"
    blog = "/blog/:slug/"
    routes = "/routes/:slug/"
    "embassy-contacts" = "/embassy-contacts/:slug/"
    "bringing-ashes-home" = "/bringing-ashes-home/:slug/"
    "cremation-transfer" = "/cremation-transfer/:slug/"
    faq = "/faq/:slug/"
  [permalinks.section]
    countries = "/repatriation-from-:slug/"
    routes = "/routes/"

[sitemap]
  changeFreq = "weekly"
  priority = 0.5
  filename = "sitemap.xml"

[taxonomies]

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[outputFormats]
  # Sitemap split (4 Jul 2026): the single sitemap.xml is replaced by a sitemap
  # index at /sitemap.xml referencing one child sitemap per section, to stay
  # under Google's 50,000-URL limit as the 38,612-route matrix fills and to give
  # per-section indexation visibility in Search Console.
  [outputFormats.SitemapIndex]
    mediaType = "application/xml"
    baseName = "sitemap"
    isPlainText = false
    noUgly = true
    rel = "sitemap"
  [outputFormats.RootSitemap]
    mediaType = "application/xml"
    baseName = "sitemap-pages"
    isPlainText = false
    noUgly = true
    rel = "sitemap"
  [outputFormats.SectionSitemap]
    mediaType = "application/xml"
    baseName = "sitemap"
    isPlainText = false
    noUgly = true
    rel = "sitemap"

[outputs]
  home = ["HTML", "RSS", "SitemapIndex", "RootSitemap"]
  section = ["HTML", "SectionSitemap"]
  page = ["HTML"]
