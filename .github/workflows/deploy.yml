name: Build and Deploy to Hostinger

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.160.1'
          extended: true

      - name: Build Hugo site
        run: |
          cd site
          hugo --gc --minify --cleanDestinationDir
        env:
          HUGO_ENVIRONMENT: production

      - name: Verify build
        run: |
          echo "HTML pages built:"
          find site/public -name '*.html' | wc -l

      - name: Deploy to Hostinger via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./site/public/
          server-dir: /public_html/
          dangerous-clean-slate: false
          security: loose
          port: 21
          timeout: 60000
          log-level: standard
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**

      - name: Notify on failure
        if: failure()
        run: |
          echo "====================================="
          echo "DEPLOY FAILED"
          echo "Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          echo "====================================="
          echo "Check: FTP secrets set? server-dir correct? Port 21 open?"
          exit 1
