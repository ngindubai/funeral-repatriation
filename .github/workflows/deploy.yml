# DISABLED 2 June 2026.
#
# This workflow used to build the site and FTP-push it into Hostinger's
# /public_html/. That is now redundant and unsafe: the live site is served by
# Hostinger's own Git integration, which pulls the pre-built `live` branch
# (produced by build-and-publish.yml) directly into /public_html/.
#
# Running an FTP push as well meant two separate processes were writing to the
# same /public_html/ folder, and this workflow also deleted the FTP sync-state
# file on every run. Both behaviours are removed by disabling it here.
#
# It is kept as a disabled stub (manual-only, no steps) rather than deleted so
# the history and prior config remain recoverable. Do NOT add a push trigger.
# The production pipeline is build-and-publish.yml -> `live` branch -> Hostinger.

name: Build and Deploy to Hostinger (DISABLED)

on:
  workflow_dispatch:

jobs:
  noop:
    runs-on: ubuntu-latest
    steps:
      - name: This workflow is intentionally disabled
        run: |
          echo "deploy.yml is disabled. The live site is served by Hostinger's"
          echo "Git integration pulling the 'live' branch (built by"
          echo "build-and-publish.yml). No FTP deploy is needed or wanted."
